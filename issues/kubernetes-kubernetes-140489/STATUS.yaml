blockers:
  - "The AKS Prow build cluster is reported to have dual-stack networking and external IPv6, but the checked job configuration does not prove that its worker kernel exposes SCTP to privileged Docker-in-Docker workloads."
  - "No checked AKS or EKS candidate combines external IPv6, Kubernetes dual-stack, SCTP, and an SCTP-capable NetworkPolicy provider."
  - "The intended CI ownership and validation path need confirmation: the closest AKS periodic is owned under sig-k8s-infra, while the target tests and analogous jobs are owned by SIG Network."
  - "A normal contributor can validate YAML and repository policy locally, but cannot independently prove the protected cloud runtime capabilities or run the new periodic before merge."
next_actions:
  - "Ask SIG Network and SIG K8s Infra whether a narrow Kind periodic on k8s-infra-aks-prow-build is the intended direction."
  - "Obtain runtime evidence for SCTP kernel/module availability inside the AKS Docker-in-Docker job and identify an SCTP-capable NetworkPolicy provider."
  - "Confirm whether one dual-stack job must cover all target labels or whether separate external-IPv6 and SCTP/NetworkPolicy jobs are acceptable."
  - "Do not plan or modify test-infra until maintainers confirm the cloud resource, ownership, and validation boundary."
